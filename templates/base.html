<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Greenplum Reorganize Center</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">
            Greenplum Reorganize Center
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNavbar"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/connections">
                        Connections
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/objects">
                        Objects
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/skew">
                        Skew Analyzer
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link disabled" href="#">
                        Vacuum / Analyze
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.path.startswith('/reorganize') %}active{% endif %}" href="/reorganize">
                        Reorganize
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link disabled" href="#">
                        gpcopy
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link disabled" href="#">
                        Queries
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid py-4">
    {% block content %}{% endblock %}
</main>

<script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

{% block scripts %}{% endblock %}

</body>
</html>
